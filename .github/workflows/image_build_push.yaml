name: Build and Push Image

on:
  push:
  workflow_dispatch:

env:
  IMAGE_NAME: quay.io/ohsu-comp-bio/arborist

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Generate image tags
        id: tags
        shell: bash
        run: |
          branch_tag="${GITHUB_REF_NAME//\//_}"
          branch_tag="$(echo "${branch_tag}" | sed 's/[^A-Za-z0-9_.-]/_/g')"
          short_sha="${GITHUB_SHA::7}"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${branch_tag}"
            echo "${IMAGE_NAME}:sha-${short_sha}"
            if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
