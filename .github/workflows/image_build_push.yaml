name: Build and Push Image

on:
  push:
  workflow_dispatch:

env:
  IMAGE_NAME: quay.io/ohsu-comp-bio/arborist

jobs:
  build-and-push:
    name: Build Image (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=arborist-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=arborist-${{ matrix.arch }}

      - name: Export digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          printf '%s\n' "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}.txt"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arborist-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge and Tag Image
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-arborist-*
          merge-multiple: true

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        shell: bash
        run: |
          branch_tag="${GITHUB_REF_NAME//\//_}"
          branch_tag="$(echo "${branch_tag}" | sed 's/[^A-Za-z0-9_.-]/_/g')"
          short_sha="${GITHUB_SHA::7}"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${branch_tag}"
            echo "${IMAGE_NAME}:sha-${short_sha}"
            if [[ "${GITHUB_REF_NAME}" == "${{ github.event.repository.default_branch }}" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create manifest list and push
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t digests < <(cat /tmp/digests/*.txt)
          docker buildx imagetools create $(echo "${{ steps.tags.outputs.tags }}" | xargs -n 1 echo -t) \
            $(printf '${{ env.IMAGE_NAME }}@%s ' "${digests[@]}")
